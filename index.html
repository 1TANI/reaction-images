<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Images</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 24px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 4px;
    color: #fff;
    margin-bottom: 6px;
  }

  .subtitle {
    color: #555;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  #search {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 3px;
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 10px 18px;
    width: 320px;
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.15s;
  }

  #search::placeholder { color: #444; }
  #search:focus { border-color: #ff3c00; }

  .count {
    color: #333;
    font-size: 0.65rem;
    letter-spacing: 1px;
    margin-top: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(18, 1fr);
    gap: 6px;
  }

  @media (max-width: 1200px) {
    .grid { grid-template-columns: repeat(10, 1fr); }
  }

  @media (max-width: 768px) {
    body { padding: 12px; }
    h1 { font-size: 2rem; }
    .subtitle { font-size: 0.6rem; }
    #search { width: 100%; font-size: 1rem; padding: 12px 14px; }
    .grid { grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .tab-btn { font-size: 0.6rem; padding: 6px 12px; letter-spacing: 1px; }
    .collection-link { font-size: 0.55rem; bottom: 10px; right: 10px; }
  }

  @media (max-width: 400px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 3px; }
  }

  .card {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: 4px;
    cursor: pointer;
    background: #1a1a1a;
    border: 1px solid #222;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }

  .card:hover {
    transform: scale(1.10);
    border-color: #ff3c00;
    z-index: 10;
  }

  @media (hover: none) {
    .card:hover { transform: none; }
    .card.tapped { border-color: #ff3c00; z-index: 10; }
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.2s;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s ease;
    padding: 6px;
  }

  .card:hover .card-overlay,
  .touch .card.tapped .card-overlay {
    opacity: 1;
  }

  .card-name {
    font-size: 0.55rem;
    text-align: center;
    color: #ff3c00;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    line-height: 1.4;
  }

  .card-download {
    position: absolute;
    bottom: 5px;
    right: 5px;
    width: 24px;
    height: 24px;
    background: #ff3c00;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s ease, transform 0.15s ease;
    z-index: 20;
    text-decoration: none;
    color: #fff;
  }

  .card:hover .card-download,
  .touch .card.tapped .card-download {
    opacity: 1;
  }

  .card-download:hover {
    transform: scale(1.15);
    background: #fff;
    color: #ff3c00;
  }

  .card-download svg {
    width: 13px;
    height: 13px;
    fill: currentColor;
  }

  /* Tabs */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 14px;
  }

  .tab-btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #555;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab-btn:hover { border-color: #ff3c00; color: #fff; }
  .tab-btn.active { background: #ff3c00; border-color: #ff3c00; color: #fff; }

  .empty-fav {
    grid-column: 1 / -1;
    text-align: center;
    color: #333;
    font-size: 0.7rem;
    letter-spacing: 2px;
    padding: 60px 0;
  }

  /* Heart button */
  .card-heart {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 24px;
    height: 24px;
    background: rgba(0,0,0,0.6);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s ease, transform 0.15s ease;
    z-index: 20;
    cursor: pointer;
    border: none;
  }

  .card:hover .card-heart,
  .touch .card.tapped .card-heart { opacity: 1; }
  .card-heart.faved { opacity: 1; }

  .card-heart svg {
    width: 13px;
    height: 13px;
    fill: #555;
    transition: fill 0.15s, transform 0.15s;
  }

  .card-heart.faved svg { fill: #ff3c00; }
  .card-heart:hover { transform: scale(1.2); }

  /* Toast notification */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #ff3c00;
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 28px;
    border-radius: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 9999;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .no-img {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: #333;
    text-align: center;
    padding: 4px;
  }

  .card-count {
    position: absolute;
    bottom: 5px;
    left: 5px;
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 0.45rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 4px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 20;
    opacity: 0.4;
  }
</style>
</head>
<body>

<header>
  <h1>REACTION IMAGES</h1>
  <p class="subtitle">CLICK TO COPY SHARE LINK</p>
  <input type="text" id="search" placeholder="Search..." autocomplete="off">
  <p class="count" id="count"></p>
  <div class="tabs">
    <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">ALL</button>
    <button class="tab-btn" id="tab-fav" onclick="switchTab('favourites')">♥ FAVOURITES</button>
  </div>
</header>

<div class="grid" id="grid"></div>
<div id="toast">Link Copied!</div>

<script>
const grid = document.getElementById('grid');

fetch('data.json')
  .then(r => r.json())
  .then(data => buildGrid(data))
  .catch(() => {
    grid.innerHTML = '<p style="color:#ff3c00;font-size:0.8rem;grid-column:1/-1">⚠ Could not load data.json — make sure it\'s in the same folder and you\'re running a local server.</p>';
  });

let allCards = [];
let favourites = JSON.parse(localStorage.getItem('meme-favs') || '[]');
let currentTab = 'all';

function saveFavs() {
  localStorage.setItem('meme-favs', JSON.stringify(favourites));
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('tab-fav').classList.toggle('active', tab === 'favourites');
  const q = document.getElementById('search').value.toLowerCase();
  filterCards(q);
}

function filterCards(q) {
  let visible = 0;
  let total = 0;
  allCards.forEach(({ card, name, itemName }) => {
    const matchSearch = name.includes(q);
    const matchTab = currentTab === 'all' || favourites.includes(itemName);
    const show = matchSearch && matchTab;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
    if (matchTab) total++;
  });

  // empty state for favourites
  const existing = document.getElementById('empty-fav');
  if (existing) existing.remove();
  if (currentTab === 'favourites' && visible === 0) {
    const empty = document.createElement('div');
    empty.id = 'empty-fav';
    empty.className = 'empty-fav';
    empty.textContent = 'No favourites yet — click the ♥ on any meme';
    document.getElementById('grid').appendChild(empty);
  }

  const countEl = document.getElementById('count');
  countEl.textContent = q ? `${visible} of ${total} memes` : '';
}

function buildGrid(data) {
const toast = document.getElementById('toast');
const searchInput = document.getElementById('search');

searchInput.addEventListener('input', () => {
  filterCards(searchInput.value.toLowerCase());
});

let toastTimeout;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 1800);
}

data.forEach(item => {
  const card = document.createElement('div');
  card.className = 'card';
  card.title = item.name;

  const img = document.createElement('img');
  img.src = item.url || item.filename;
  img.alt = item.name;
  img.loading = 'lazy';
  img.onerror = function() {
    this.style.display = 'none';
    const placeholder = document.createElement('div');
    placeholder.className = 'no-img';
    placeholder.textContent = item.name;
    card.insertBefore(placeholder, overlay);
  };

  const overlay = document.createElement('div');
  overlay.className = 'card-overlay';
  const nameEl = document.createElement('span');
  nameEl.className = 'card-name';
  nameEl.textContent = item.name;
  overlay.appendChild(nameEl);

  // Heart button
  const heart = document.createElement('button');
  heart.className = 'card-heart' + (favourites.includes(item.name) ? ' faved' : '');
  heart.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
  heart.title = 'Favourite';
  heart.addEventListener('click', e => {
    e.stopPropagation();
    if (favourites.includes(item.name)) {
      favourites = favourites.filter(f => f !== item.name);
      heart.classList.remove('faved');
    } else {
      favourites.push(item.name);
      heart.classList.add('faved');
    }
    saveFavs();
    if (currentTab === 'favourites') filterCards(searchInput.value.toLowerCase());
  });

  const dlBtn = document.createElement('a');
  dlBtn.className = 'card-download';
  dlBtn.title = 'Download';
  dlBtn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4v-2h14v2H5z"/></svg>';
  dlBtn.href = item.url || item.filename;
  dlBtn.download = item.filename;
  dlBtn.addEventListener('click', e => e.stopPropagation());

  // Copy count badge
  const countBadge = document.createElement('div');
  countBadge.className = 'card-count';
  countBadge.textContent = '0';

  // Fetch current count (non-blocking)
  const apiKey = 'memevault-' + item.name.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase().slice(0, 50);
  fetch('https://countapi.mileshilliard.com/api/v1/get/' + apiKey)
    .then(r => r.json())
    .then(d => {
      const val = parseInt(d.value) || 0;
      countBadge.textContent = val;
    })
    .catch(() => {});

  card.appendChild(img);
  card.appendChild(overlay);
  card.appendChild(heart);
  card.appendChild(countBadge);
  card.appendChild(dlBtn);

  card.addEventListener('click', () => {
    const toCopy = item.url || item.filename;
    navigator.clipboard.writeText(toCopy).then(() => {
      showToast('Link Copied!');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = toCopy;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Link Copied!');
    });
    // Increment shared counter
    const key = 'memevault-' + item.name.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase().slice(0, 50);
    fetch('https://countapi.mileshilliard.com/api/v1/hit/' + key)
      .then(r => r.json())
      .then(d => {
        const val = parseInt(d.value) || 0;
        countBadge.textContent = val;
      })
      .catch(() => {});
  });

  // Touch: first tap reveals buttons, second tap copies
  // Track touch start position to distinguish tap from scroll
  let touchStartY = 0;
  card.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  card.addEventListener('touchend', e => {
    if (!document.body.classList.contains('touch')) return;
    const touchEndY = e.changedTouches[0].clientY;
    const didScroll = Math.abs(touchEndY - touchStartY) > 8;
    if (didScroll) return; // user was scrolling, ignore
    if (!card.classList.contains('tapped')) {
      e.preventDefault();
      document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped'));
      card.classList.add('tapped');
    }
  }, { passive: false });

  allCards.push({ card, name: item.name.toLowerCase(), itemName: item.name });
  document.getElementById('grid').appendChild(card);
});

// Detect touch device
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.body.classList.add('touch');
}

// Tap outside to close
document.addEventListener('touchstart', e => {
  if (!e.target.closest('.card')) {
    document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped'));
  }
});
}
</script>
</body>
</html>
